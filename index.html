<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:transparent;
}

.reel{
    width:100%;
    overflow:hidden;
    padding:6px 0;
    cursor:grab;
}

.track{
    display:flex;
    gap:14px;
    width:max-content;
    will-change:transform;
}

.item{
    flex:0 0 auto;
    display:block;
}

.item img{
    width:165px;
    height:auto;
    display:block;
    border-radius:12px;
    transition:transform .25s ease;
}

.item:hover img{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="reel" id="reel">
    <div class="track" id="track"></div>
</div>

<script>

const videos = [

{
video:"https://woodsorg.sharepoint.com/sites/AlliesHome/Lists/Allies%20Digital%20Archive/Attachments/52/20140114%20-%20Project%20Grow.mp4?web=1",
image:"https://woodsorg.sharepoint.com/sites/AlliesHome/_api/v2.1/sites('397e86cc-e81c-4a84-872b-0ec35dda80bb,a77bbbfc-7bb5-479b-8e38-c67b3951cba1')/lists('8aecd2ca-8ad0-44ef-bdf9-f4cc9acaee09')/items('52')/attachments('Reserved_ImageAttachment_%5B14%5D_%5BThumbnailImage%5D%5B32%5D_%5Bb67bd77b5a334c758308a6fe9cd52b1c%5D%5B1%5D_%5B2%5D.png')/thumbnails/0/c3000x2000/content?prefer=noredirect%2Cclosestavailablesize"
},

{
video:"https://woodsorg.sharepoint.com/sites/AlliesHome/Lists/Allies%20Digital%20Archive/Attachments/58/20140114%20-%20Greensleeves.mp4?web=1",
image:"https://woodsorg.sharepoint.com/sites/AlliesHome/_api/v2.1/sites('397e86cc-e81c-4a84-872b-0ec35dda80bb,a77bbbfc-7bb5-479b-8e38-c67b3951cba1')/lists('8aecd2ca-8ad0-44ef-bdf9-f4cc9acaee09')/items('58')/attachments('Reserved_ImageAttachment_%5B14%5D_%5BThumbnailImage%5D%5B32%5D_%5B802e21faf3e743aa8bf9be8870829f5f%5D%5B1%5D_%5B2%5D.png')/thumbnails/0/c3000x2000/content?prefer=noredirect%2Cclosestavailablesize"
},

{
video:"https://woodsorg.sharepoint.com/sites/AlliesHome/Lists/Allies%20Digital%20Archive/Attachments/59/20140217%20-%20Allies,%20Inc.%202009%20Gala%20Slideshow.mp4",
image:"https://woodsorg.sharepoint.com/sites/AlliesHome/_api/v2.1/sites('397e86cc-e81c-4a84-872b-0ec35dda80bb,a77bbbfc-7bb5-479b-8e38-c67b3951cba1')/lists('8aecd2ca-8ad0-44ef-bdf9-f4cc9acaee09')/items('59')/attachments('Reserved_ImageAttachment_%5B14%5D_%5BThumbnailImage%5D%5B32%5D_%5B6aa57483899a44e8891e040f9cf267d5%5D%5B1%5D_%5B2%5D.png')/thumbnails/0/c3000x2000/content?prefer=noredirect%2Cclosestavailablesize"
},

{
video:"https://woodsorg.sharepoint.com/sites/AlliesHome/Lists/Allies%20Digital%20Archive/Attachments/60/Allies,%20Inc.%20Residential%20Services.mp4?web=1",
image:"https://woodsorg.sharepoint.com/sites/AlliesHome/_api/v2.1/sites('397e86cc-e81c-4a84-872b-0ec35dda80bb,a77bbbfc-7bb5-479b-8e38-c67b3951cba1')/lists('8aecd2ca-8ad0-44ef-bdf9-f4cc9acaee09')/items('60')/attachments('Reserved_ImageAttachment_%5B14%5D_%5BThumbnailImage%5D%5B32%5D_%5B3c82928d2115432cba545fc62173f809%5D%5B1%5D_%5B1%5D.png')/thumbnails/0/c3000x2000/content?prefer=noredirect%2Cclosestavailablesize"
}

];

const track=document.getElementById("track");
const reel=document.getElementById("reel");

function makeItem(item){

const a=document.createElement("a");

a.href=item.video;
a.target="_blank";
a.className="item";

const img=document.createElement("img");
img.src=item.image;

a.appendChild(img);

return a;

}

// Duplicate many times so it never ends
for(let i=0;i<20;i++){
    videos.forEach(v=>track.appendChild(makeItem(v)));
}

let x=0;
let paused=false;
const speed=.45;

reel.addEventListener("mouseenter",()=>paused=true);
reel.addEventListener("mouseleave",()=>paused=false);

function animate(){

if(!paused){

x-=speed;

const first=track.firstElementChild;
const firstWidth=first.offsetWidth+14;

if(-x>=firstWidth){

track.appendChild(first);
x+=firstWidth;

}

track.style.transform=`translateX(${x}px)`;

}

requestAnimationFrame(animate);

}

requestAnimationFrame(animate);

</script>

</body>
</html>
